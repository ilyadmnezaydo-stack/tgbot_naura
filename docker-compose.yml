services:
  bot:
    build: .
    env_file:
      - .env
    environment:
      APP_MODE: bot
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  api:
    build: .
    env_file:
      - .env
    environment:
      APP_MODE: api
      API_PORT: 8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    ports:
      - "${API_HOST_PORT:-8082}:8080"
    restart: unless-stopped
